<title>全台互助會 - 清新高質感首頁</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&family=Noto+Sans+TC:wght@400;600;700&display=swap" rel="stylesheet">

<style>
/* ===== 全局 ===== */
*{margin:0;padding:0;box-sizing:border-box;font-family:"Poppins","Noto Sans TC";}
body{background: linear-gradient(135deg, #D6F0FF, #FFFFFF); color:#1A2B3C; line-height:1.6;}

/* ===== 內容容器靠中 ===== */
.main-container{
  width: 100%;
  max-width: 1200px;
  margin: 0 auto;
  padding: 0 20px;
}

/* ===== Header ===== */
.header{
  display:flex; justify-content:space-between; align-items:center;
  padding:25px 0;
}
.logo{
  font-size:32px; font-weight:700; color:#1E90FF;
}
.btn{
  padding:14px 32px; border-radius:12px; background:#1E90FF; color:#fff; font-weight:700; transition:0.3s;
}
.btn:hover{background:#3AA0FF;}

/* ===== Hero ===== */
.hero{
  display:flex; flex-wrap:wrap; justify-content:space-between; align-items:flex-start;
  padding:60px 0; gap:40px;
}
.hero-left h1{
  font-size:60px; font-weight:700; line-height:1.2; color:#1E90FF;
}
.hero-left p{
  margin-top:20px; font-size:20px; font-weight:600; color:#555;
}

/* ===== 卡片 ===== */
.card{
  background: #fff; border-radius:20px; padding:25px; margin-bottom:20px;
  box-shadow: 0 10px 25px rgba(30,144,255,0.1); transition:0.3s;
}
.card:hover{box-shadow: 0 15px 35px rgba(30,144,255,0.2);}
.card h3{font-size:22px; color:#1E90FF; margin-bottom:12px;}
.card p{font-size:16px; color:#333; margin-bottom:6px;}

/* ===== 統計卡 ===== */
.mini-stats{display:flex; gap:20px; flex-wrap:wrap; justify-content:center;}
.mini{
  flex:0 0 150px;
  background:#E6F2FF; padding:20px; border-radius:16px;
  text-align:center; font-weight:700; font-size:18px; color:#1E90FF;
  display:flex; flex-direction:column; align-items:center; justify-content:center;
  transition:0.3s;
}
.mini:hover{transform:translateY(-3px); box-shadow:0 8px 20px rgba(30,144,255,0.2);}
.mini .number{font-size:22px;}
.mini .label{font-size:14px; margin-top:4px;}

/* ===== Section ===== */
.section{padding:60px 0; text-align:center;}
.reviews, .steps{display:flex; gap:20px; flex-wrap:wrap; justify-content:center;}
.review, .step{
  flex:1; min-width:200px; background:#fff; border-radius:20px; padding:30px;
  box-shadow:0 10px 25px rgba(30,144,255,0.1); font-weight:600; transition:0.3s;
}
.review:hover, .step:hover{transform:translateY(-5px); box-shadow:0 15px 35px rgba(30,144,255,0.2);}

/* ===== CTA ===== */
.cta{
  background:#1E90FF; color:#fff; padding:80px 40px; border-radius:25px; text-align:center; margin:60px 0;
}
.cta h2{font-size:36px; margin-bottom:25px;}
.cta a{
  background:#fff; color:#1E90FF; padding:18px 50px; border-radius:50px; font-weight:700; transition:0.3s;
}
.cta a:hover{background:#E6F2FF;}

/* ===== 背景文字 ===== */
.bg-text-big{
  position:fixed; top:50%; left:50%; transform:translate(-50%, -50%);
  font-size:120px; font-weight:700; color:rgba(30,144,255,0.05); z-index:-1; letter-spacing:8px;
}

/* ===== 中間聊天框 ===== */
.chat-demo{
  flex:1; display:flex; justify-content:center; align-items:center; margin:30px 0;
}
.chat-box{
  width:100%; max-width:320px; background:#ffffff; border-radius:20px; padding:20px;
  box-shadow:0 15px 35px rgba(30,144,255,0.15);
}
.chat-msg{
  padding:10px 14px; border-radius:14px; margin:8px 0; font-size:14px; max-width:80%;
  animation:fadeInUp 0.6s ease forwards; opacity:0;
}
.chat-msg.left{background:#F1F7FF; color:#333;}
.chat-msg.right{background:#1E90FF; color:#fff; margin-left:auto;}
@keyframes fadeInUp{from{opacity:0; transform:translateY(10px);} to{opacity:1; transform:translateY(0);}

/* ===== 響應式 ===== */
@media(max-width:768px){
  .hero{flex-direction:column; gap:40px;}
  .bg-text-big{font-size:80px;}
  .hero-left h1{font-size:42px;}
}
</style>
