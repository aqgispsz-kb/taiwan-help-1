<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:"Poppins","Noto Sans TC";}
body{background: linear-gradient(135deg, #D6F0FF, #FFFFFF); color:#1A2B3C; line-height:1.6;}

.main-container{
  width: 100%;
  max-width: 1200px;
  margin: 0 auto;
  padding: 0 20px;
}

.header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:25px 0;
}

.logo{
  font-size:32px;
  font-weight:700;
  color:#1E90FF;
}

.btn{
  padding:14px 32px;
  border-radius:12px;
  background:#1E90FF;
  color:#fff;
  font-weight:700;
  transition:0.3s;
  text-decoration:none;
}

.btn:hover{background:#3AA0FF;}

.hero{
  display:flex;
  flex-wrap:wrap;
  justify-content:space-between;
  align-items:flex-start;
  padding:60px 0;
  gap:40px;
}

.hero-left h1{
  font-size:60px;
  font-weight:700;
  line-height:1.2;
  color:#1E90FF;
}

.hero-left p{
  margin-top:20px;
  font-size:20px;
  font-weight:600;
  color:#555;
}

.card{
  background: #fff;
  border-radius:20px;
  padding:25px;
  margin-bottom:20px;
  box-shadow: 0 10px 25px rgba(30,144,255,0.1);
  transition:0.3s;
}

.card:hover{
  box-shadow: 0 15px 35px rgba(30,144,255,0.2);
}

.card h3{
  font-size:22px;
  color:#1E90FF;
  margin-bottom:12px;
}

.card p{
  font-size:16px;
  color:#333;
  margin-bottom:6px;
}

.mini-stats{
  display:flex;
  gap:20px;
  flex-wrap:wrap;
  justify-content:center;
}

.mini{
  flex:0 0 150px;
  background:#E6F2FF;
  padding:20px;
  border-radius:16px;
  text-align:center;
  font-weight:700;
  font-size:18px;
  color:#1E90FF;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
}

.section{
  padding:60px 0;
  text-align:center;
}

.reviews, .steps{
  display:flex;
  gap:20px;
  flex-wrap:wrap;
  justify-content:center;
}

.review, .step{
  flex:1;
  min-width:200px;
  background:#fff;
  border-radius:20px;
  padding:30px;
  box-shadow:0 10px 25px rgba(30,144,255,0.1);
  font-weight:600;
}

.cta{
  background:#1E90FF;
  color:#fff;
  padding:80px 40px;
  border-radius:25px;
  text-align:center;
  margin:60px 0;
}

.cta h2{
  font-size:36px;
  margin-bottom:25px;
}

.cta a{
  background:#fff;
  color:#1E90FF;
  padding:18px 50px;
  border-radius:50px;
  font-weight:700;
  text-decoration:none;
}

.bg-text-big{
  position:fixed;
  top:50%;
  left:50%;
  transform:translate(-50%, -50%);
  font-size:120px;
  font-weight:700;
  color:rgba(30,144,255,0.05);
  z-index:-1;
}

.chat-demo{
  flex:1;
  display:flex;
  justify-content:center;
  align-items:center;
  margin:30px 0;
}

.chat-box{
  width:100%;
  max-width:320px;
  background:#ffffff;
  border-radius:20px;
  padding:20px;
  box-shadow:0 15px 35px rgba(30,144,255,0.15);
}

.chat-msg{
  padding:10px 14px;
  border-radius:14px;
  margin:8px 0;
  font-size:14px;
  max-width:80%;
}

.chat-msg.left{background:#F1F7FF;}
.chat-msg.right{background:#1E90FF;color:#fff;margin-left:auto;}

@media(max-width:768px){
  .hero{flex-direction:column;}
  .hero-left h1{font-size:42px;}
}
</style>

<body>

<div class="main-container">

<div class="bg-text-big">全台互助會</div>

<header class="header">

<a href="https://line.me/ti/p/~841lsoqs" class="btn">立即申請</a>

<div class="chat-msg left">需要準備什麼資料？</div>
<div class="chat-msg right">基本資料即可，流程非常簡單</div>
</div>
</div>

<div>

<div class="card">
<h3>借款優勢</h3>
<p>✔ AI快速審核</p>
<p>✔ 不查聯徵</p>
<p>✔ 資料全程加密</p>
</div>

<div class="mini-stats">
<div class="mini" id="userCount">
<span class="number">0</span>
<span class="label">用戶</span>
</div>
<div class="mini">
<span class="number">98%</span>
<span class="label">通過率</span>
</div>
</div>

<div class="card">
<h3>最高借款額度</h3>
<p style="font-size:28px; color:#1E90FF;">150,000 元</p>
<a href="https://line.me/ti/p/~841lsoqs" class="btn">立即申請</a>
</div>

</div>
</section>

<section class="section">
<h2>用戶評價</h2>
<div class="reviews">
<div class="review">👍 核准迅速</div>
<div class="review">💬 方便操作</div>

</div>
</section>

<section class="section">
<h2>申請流程</h2>
<div class="steps">
<div class="step">填資料</div>
<div class="step">審核</div>
<div class="step">撥款</div>
</div>
</section>

<section class="cta">
<h2>立即申請，快速取得資金</h2>
<a href="https://line.me/ti/p/~841lsoqs">馬上諮詢</a>
</section>

</div>

<script>
const userCounterNumber = document.querySelector('#userCount .number');
let target = 100000;
let current = 0;
let step = Math.ceil(target / 200);

let interval = setInterval(() => {
  current += step;
  if (current >= target) {
    current = target;
    clearInterval(interval);
  }
  userCounterNumber.textContent = current.toLocaleString();
}, 20);
</script>
